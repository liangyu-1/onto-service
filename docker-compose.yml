services:
  # Doris FE (Frontend)
  doris-fe:
    image: apache/doris:fe-4.0.4
    container_name: onto-doris-fe
    hostname: doris-fe
    ports:
      - "8030:8030"
      - "9030:9030"
    environment:
      - FE_MASTER_IP=172.20.0.10
      - FE_MASTER_PORT=9010
      - FE_CURRENT_IP=172.20.0.10
      - FE_CURRENT_PORT=9010
    networks:
      onto-network:
        ipv4_address: 172.20.0.10
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8030/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Doris BE (Backend)
  doris-be:
    image: apache/doris:be-4.0.4
    container_name: onto-doris-be
    hostname: doris-be
    ports:
      - "8040:8040"
      - "9050:9050"
    environment:
      - FE_MASTER_IP=172.20.0.10
      - BE_IP=172.20.0.11
      - BE_PORT=9050
    networks:
      onto-network:
        ipv4_address: 172.20.0.11
    depends_on:
      doris-fe:
        condition: service_healthy

  # Ontology Service Java
  onto-service-java:
    image: eclipse-temurin:17-jre-jammy
    container_name: onto-service-java
    ports:
      - "8080:8080"
    environment:
      - DORIS_HOST=doris-fe
      - DORIS_PORT=9030
      - DORIS_DB=ontology
      - DORIS_USER=root
      - DORIS_PASSWORD=
      - PYTHON_SERVICE_URL=http://onto-service-python:5000
    volumes:
      - ./onto-service-java/target:/app
    command: ["java", "-jar", "/app/onto-service-1.0.0-SNAPSHOT.jar"]
    depends_on:
      doris-fe:
        condition: service_healthy
    networks:
      - onto-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/domains || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Ontology Service Python
  onto-service-python:
    image: onto-service-onto-service-python:latest
    container_name: onto-service-python
    ports:
      - "5001:5000"
    environment:
      - JAVA_SERVICE_URL=http://onto-service-java:8080
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-3.5-turbo}
    depends_on:
      onto-service-java:
        condition: service_healthy
    networks:
      - onto-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  doris-fe-data:
  doris-be-data:

networks:
  onto-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
