server:
  port: 8080

spring:
  application:
    name: onto-service

  datasource:
    url: jdbc:mysql://${DORIS_HOST:localhost}:${DORIS_PORT:9030}/${DORIS_DB:ontology}?useSSL=false&characterEncoding=UTF-8
    username: ${DORIS_USER:root}
    password: ${DORIS_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: input
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Ontology Service Configuration
onto:
  service:
    # GoogleSQL 配置
    googlesql:
      enabled: true
      catalog-cache-ttl-minutes: 10
    # 查询配置
    query:
      max-limit: 10000
      default-limit: 100
      timeout-seconds: 30
    # Action 配置
    action:
      dry-run-enabled: true
      audit-enabled: true
      default-timeout-seconds: 60
    # LLM / Grounding 配置
    grounding:
      python-service-url: ${PYTHON_SERVICE_URL:http://localhost:5000}
      embedding-dimension: 768
